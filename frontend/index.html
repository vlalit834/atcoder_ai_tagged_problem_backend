    <!-- Structured Data: WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "AtCoder AI Tagged Problems",

      "description": "Browse and filter AtCoder competitive programming problems by AI-generated topic tags. Track solved problems per AtCoder user.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://atcoder-ai-tagged-problem.vercel.app/list?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <script type="application/ld+json">

      "@context": "https://schema.org",
