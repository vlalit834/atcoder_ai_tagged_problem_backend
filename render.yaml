services:
  - type: web
    name: atcoder-tagged-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && mkdir -p data && curl -L -H "Authorization: Bearer ${HF_TOKEN}" -o data/problems.db https://huggingface.co/datasets/vlalit834/atcoder-tagged-db/resolve/main/problems.db
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: ALLOWED_ORIGINS
        value: "*"