services:
  - type: web
    name: atcoder-tagged-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && cp /etc/secrets/problems.db data/problems.db
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: ALLOWED_ORIGINS
        value: "*"